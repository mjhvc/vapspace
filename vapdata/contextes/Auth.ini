;dynamique: les tables 'dynamiques' sont celles qui stocquent les champs oblig et facul ci-dessous
;tables[0] doit contenir la PK qui est la Principal Primary Key du contexte
;PK la Primary Key, PK[0] doit etre la PK de tables[0] et est la PPK du  contexte. Elle  sera retournÈe en valeur finale
;FK la cle auxiliaire de tables[1], doit pointer(Foreign Key Pointe) sur PK[0]
[dynamique]
tables=spip_vap_humains 
PK=idhum 

; spip_vap_humains possede une FK lienreg qui pointe sur idreg
[extra]
tables=spip_vap_regions
FK=lienreg
FKP=idreg
  
